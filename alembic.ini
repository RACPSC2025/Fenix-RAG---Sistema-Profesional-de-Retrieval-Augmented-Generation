# Alembic configuration — Fénix RAG
# La URL de BD se sobreescribe en env.py desde settings (no leerla de aquí)

[alembic]
# Ruta al script de entorno
script_location = src/persistence/migrations

# Plantilla para nombres de revisión
file_template = %%(rev)s_%%(slug)s

# Directorio de versiones
version_locations = src/persistence/migrations/versions

# Timezone para los timestamps en las migraciones
timezone = UTC

# Comparar tipos de columnas al autogenerar
compare_type = true

# Comparar server_default al autogenerar
compare_server_default = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
