version: "3.9"

# ─── Variables compartidas por todos los servicios Django/Python ───────────────
x-app-env: &app-env
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: ""   # no usamos Django aquí
  depends_on:
    postgres:
      condition: service_healthy
    chroma:
      condition: service_started

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fenix_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fenix_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c wal_level=replica

  # ─── Chroma Vector Store ─────────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/data
    volumes:
      - chroma_data:/chroma/data
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI (Fénix RAG API) ──────────────────────────────────────────────
  api:
    <<: [*app-build, *app-env]
    command: >
      sh -c "
        echo '>>> Aplicando migraciones...' &&
        alembic upgrade head &&
        echo '>>> Iniciando API...' &&
        uvicorn src.api.main:app
          --host 0.0.0.0
          --port 8000
          --workers ${API_WORKERS:-2}
          --loop uvloop
          --http httptools
          --log-level info
      "
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/storage/uploads
      - ./storage/chroma:/app/storage/chroma   # persistencia local de Chroma
    environment:
      CHROMA_PERSIST_DIR: /app/storage/chroma
      DATABASE_URL: postgresql+psycopg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/fenix_rag
      REDIS_URL: ""  # sin redis por ahora
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── MCP Server (stdio / HTTP) ───────────────────────────────────────────────
  mcp:
    <<: [*app-build, *app-env]
    command: >
      python -m src.mcp.server
        --transport http
        --host 0.0.0.0
        --port 8001
    ports:
      - "8001:8001"
    volumes:
      - uploads_data:/app/storage/uploads
      - ./storage/chroma:/app/storage/chroma
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${DB_PASSWORD:-postgres}@postgres:5432/fenix_rag
      CHROMA_PERSIST_DIR: /app/storage/chroma
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - mcp   # iniciar solo cuando se necesite: docker compose --profile mcp up

  # ─── Adminer (DB management UI) ──────────────────────────────────────────────
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev   # solo en desarrollo: docker compose --profile dev up

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  uploads_data:
    driver: local

networks:
  default:
    name: fenix-rag-network
